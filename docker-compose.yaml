services:

  # ── Aplicación Go ──────────────────────────────────────────────
  app:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── Base de datos PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ── Visor de base de datos pgAdmin ─────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    env_file: .env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

volumes:
  pgdata:
